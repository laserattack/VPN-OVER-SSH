kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version = "1.10.2" }
robolectric = { module = "org.robolectric:robolectric", version = "4.16.1" }
roborazzi = { module = "io.github.takahirom.roborazzi:roborazzi", version = "1.59.0" }
